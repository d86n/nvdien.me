<!doctype html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="padding: 20px; font-family: sans-serif;">

    <input type="text" id="input" 
        style="width: 100%; font-size: 24px; padding: 10px; box-sizing: border-box;" 
        placeholder="16h45+2h44" oninput="tinh()">
    
    <div id="result" style="font-size: 30px; font-weight: bold; margin-top: 20px;"></div>

    <script>
        function tinh() {
            const input = document.getElementById('input').value;
            const resElement = document.getElementById('result');
            
            if (!input.includes('+')) {
                resElement.innerText = "";
                return;
            }

            const parts = input.split('+');
            let tongPhut = 0;

            parts.forEach(p => {
                const time = p.trim().replace('h', ':').split(':');
                const h = parseInt(time[0]) || 0;
                const m = parseInt(time[1]) || 0;
                tongPhut += h * 60 + m;
            });

            const resH = Math.floor(tongPhut / 60);
            const resM = tongPhut % 60;

            resElement.innerText = " = " + resH + "h" + (resM < 10 ? '0' + resM : resM);
        }
    </script>

</body>
</html>
