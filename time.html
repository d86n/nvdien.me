<!doctype html>
<html>
<body>

    <input type="text" id="input" size="40" placeholder="thời gian bắt đầu + thời gian in = thời gian in xong" oninput="tinh()">
    <span id="result"></span>

    <script>
        function tinh() {
            const input = document.getElementById('input').value;
            if (!input.includes('+')) {
                document.getElementById('result').innerText = "";
                return;
            }

            const parts = input.split('+');
            let tongPhut = 0;

            parts.forEach(p => {
                const time = p.trim().replace('h', ':').split(':');
                const h = parseInt(time[0]) || 0;
                const m = parseInt(time[1]) || 0;
                tongPhut += h * 60 + m;
            });

            const resH = Math.floor(tongPhut / 60);
            const resM = tongPhut % 60;

            document.getElementById('result').innerText = " = " + resH + "h" + (resM < 10 ? '0' + resM : resM);
        }
    </script>

</body>
</html>
